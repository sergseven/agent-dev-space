version: "3"

dotenv: [".env"]

vars:
  STATE_FILE: .agentbox-state
  KNOWN_HOSTS: .agentbox-known-hosts
  SSH_OPTS: -A -o UserKnownHostsFile={{.KNOWN_HOSTS}} -o StrictHostKeyChecking=no

tasks:
  # --- Core lifecycle ---

  provision:
    desc: Provision a new Hetzner VM with Claude Code
    cmds:
      - ./provision.sh

  resize:
    desc: Resize the VM to a different server type (preserves data)
    cmds:
      - ./resize.sh
    preconditions:
      - test -f {{.STATE_FILE}}

  destroy:
    desc: Destroy the provisioned VM (interactive confirmation)
    cmds:
      - ./destroy.sh

  # --- Connection ---

  connect:
    desc: Interactive tmux session selector — pick a session or create a new one
    cmds:
      - ./scripts/connect.sh
    preconditions:
      - test -f {{.STATE_FILE}}

  ssh:root:
    desc: SSH into the VM as root (maintenance/debug)
    cmds:
      - ssh {{.SSH_OPTS}} root@{{.SERVER_IP}}
    vars:
      SERVER_IP:
        sh: grep '^SERVER_IP=' {{.STATE_FILE}} | cut -d= -f2-
    preconditions:
      - test -f {{.STATE_FILE}}

  # --- IDE tunnels ---

  tunnel:code:
    desc: Start VS Code dev tunnel on VM (connect from local VS Code)
    cmds:
      - ssh {{.SSH_OPTS}} -t agentbox@{{.SERVER_IP}} "code tunnel --accept-server-license-terms"
    vars:
      SERVER_IP:
        sh: grep '^SERVER_IP=' {{.STATE_FILE}} | cut -d= -f2-
    preconditions:
      - test -f {{.STATE_FILE}}

  tunnel:jb:
    desc: Print JetBrains Gateway SSH connection instructions
    cmds:
      - |
        echo ""
        echo "=== JetBrains Gateway (SSH) ==="
        echo ""
        echo "1. Open JetBrains Gateway"
        echo "2. Click 'SSH' → 'New Connection'"
        echo "3. Enter:"
        echo "     Host: {{.SERVER_IP}}"
        echo "     User: agentbox"
        echo "     Auth: Key pair"
        echo "4. Select your IDE (IntelliJ, PyCharm, GoLand, etc.)"
        echo "5. Choose project directory on VM"
        echo ""
        echo "Gateway auto-installs the IDE backend on the VM."
        echo "SSH agent forwarding is pre-configured."
        echo ""
    vars:
      SERVER_IP:
        sh: grep '^SERVER_IP=' {{.STATE_FILE}} | cut -d= -f2-
    preconditions:
      - test -f {{.STATE_FILE}}

  # --- Config sync ---

  sync:
    desc: Sync local configs (.gitconfig, .ssh, .claude) to VM
    cmds:
      - ./sync-config.sh {{.SERVER_IP}}
    vars:
      SERVER_IP:
        sh: grep '^SERVER_IP=' {{.STATE_FILE}} | cut -d= -f2-
    preconditions:
      - test -f {{.STATE_FILE}}

  # --- Status & info ---

  status:
    desc: Show VM status and info
    cmds:
      - |
        echo "=== Agent Dev Space Status ==="
        echo ""
        cat {{.STATE_FILE}}
        echo ""
        echo "--- VM reachable ---"
        ssh {{.SSH_OPTS}} -o ConnectTimeout=5 agentbox@{{.SERVER_IP}} \
          "uptime; echo ''; echo '--- tmux sessions ---'; tmux list-sessions 2>/dev/null || echo 'No tmux sessions'; echo ''; echo '--- disk ---'; df -h / | tail -1; echo ''; echo '--- memory ---'; free -h | grep Mem; echo ''; echo '--- claude ---'; claude --version 2>/dev/null || echo 'not found'; echo ''; echo '--- docker ---'; docker --version 2>/dev/null || echo 'not installed'; docker compose version 2>/dev/null || echo ''" \
          2>/dev/null || echo "VM not reachable"
    vars:
      SERVER_IP:
        sh: grep '^SERVER_IP=' {{.STATE_FILE}} | cut -d= -f2-
    preconditions:
      - test -f {{.STATE_FILE}}

  ip:
    desc: Print the VM IP address
    cmds:
      - grep '^SERVER_IP=' {{.STATE_FILE}} | cut -d= -f2-
    preconditions:
      - test -f {{.STATE_FILE}}

  # --- Maintenance ---

  setup:
    desc: Re-run the setup script on an existing VM (idempotent)
    cmds:
      - scp {{.SSH_OPTS}} scripts/setup-vm.sh root@{{.SERVER_IP}}:/tmp/setup-vm.sh
      - ssh {{.SSH_OPTS}} root@{{.SERVER_IP}} "bash /tmp/setup-vm.sh && rm -f /tmp/setup-vm.sh"
    vars:
      SERVER_IP:
        sh: grep '^SERVER_IP=' {{.STATE_FILE}} | cut -d= -f2-
    preconditions:
      - test -f {{.STATE_FILE}}

