version: "3"

dotenv: [".env"]

vars:
  STATE_FILE: .agentbox-state
  KNOWN_HOSTS: .agentbox-known-hosts
  SSH_OPTS: -o UserKnownHostsFile={{.KNOWN_HOSTS}} -o StrictHostKeyChecking=no

tasks:
  # --- Core lifecycle ---

  provision:
    desc: Provision a new Hetzner VM with Claude Code
    cmds:
      - ./provision.sh

  destroy:
    desc: Destroy the provisioned VM (interactive confirmation)
    cmds:
      - ./destroy.sh

  # --- Connection ---

  ssh:
    desc: SSH into the VM as agentbox user
    cmds:
      - ssh {{.SSH_OPTS}} agentbox@{{.SERVER_IP}}
    vars:
      SERVER_IP:
        sh: grep '^SERVER_IP=' {{.STATE_FILE}} | cut -d= -f2-
    preconditions:
      - test -f {{.STATE_FILE}}

  ssh:root:
    desc: SSH into the VM as root (if still accessible)
    cmds:
      - ssh {{.SSH_OPTS}} root@{{.SERVER_IP}}
    vars:
      SERVER_IP:
        sh: grep '^SERVER_IP=' {{.STATE_FILE}} | cut -d= -f2-
    preconditions:
      - test -f {{.STATE_FILE}}

  # --- Claude Code ---

  claude:
    desc: Start Claude Code in a new tmux session on the VM
    cmds:
      - ssh {{.SSH_OPTS}} -t agentbox@{{.SERVER_IP}} "tmux new-session -A -s claude"
    vars:
      SERVER_IP:
        sh: grep '^SERVER_IP=' {{.STATE_FILE}} | cut -d= -f2-
    preconditions:
      - test -f {{.STATE_FILE}}

  attach:
    desc: Attach to existing Claude Code tmux session
    cmds:
      - ssh {{.SSH_OPTS}} -t agentbox@{{.SERVER_IP}} "tmux attach -t claude"
    vars:
      SERVER_IP:
        sh: grep '^SERVER_IP=' {{.STATE_FILE}} | cut -d= -f2-
    preconditions:
      - test -f {{.STATE_FILE}}

  # --- Status & info ---

  status:
    desc: Show VM status and info
    cmds:
      - |
        echo "=== AgentBox Status ==="
        echo ""
        cat {{.STATE_FILE}}
        echo ""
        echo "--- VM reachable ---"
        ssh {{.SSH_OPTS}} -o ConnectTimeout=5 agentbox@{{.SERVER_IP}} \
          "uptime; echo ''; echo '--- tmux sessions ---'; tmux list-sessions 2>/dev/null || echo 'No tmux sessions'; echo ''; echo '--- disk ---'; df -h / | tail -1; echo ''; echo '--- memory ---'; free -h | grep Mem; echo ''; echo '--- claude ---'; claude --version 2>/dev/null || echo 'not found'" \
          2>/dev/null || echo "VM not reachable"
    vars:
      SERVER_IP:
        sh: grep '^SERVER_IP=' {{.STATE_FILE}} | cut -d= -f2-
    preconditions:
      - test -f {{.STATE_FILE}}

  ip:
    desc: Print the VM IP address
    cmds:
      - grep '^SERVER_IP=' {{.STATE_FILE}} | cut -d= -f2-
    preconditions:
      - test -f {{.STATE_FILE}}

  # --- Maintenance ---

  setup:
    desc: Re-run the setup script on an existing VM (idempotent)
    cmds:
      - scp {{.SSH_OPTS}} scripts/setup-vm.sh root@{{.SERVER_IP}}:/tmp/setup-vm.sh
      - ssh {{.SSH_OPTS}} root@{{.SERVER_IP}} "bash /tmp/setup-vm.sh && rm -f /tmp/setup-vm.sh"
    vars:
      SERVER_IP:
        sh: grep '^SERVER_IP=' {{.STATE_FILE}} | cut -d= -f2-
    preconditions:
      - test -f {{.STATE_FILE}}

