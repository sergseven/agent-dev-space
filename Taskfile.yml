version: "3"

dotenv: [".env"]

vars:
  STATE_FILE: .agentbox-state
  KNOWN_HOSTS: .agentbox-known-hosts
  SSH_OPTS: -A -o UserKnownHostsFile={{.KNOWN_HOSTS}} -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=3

tasks:
  # --- Core lifecycle ---

  provision:
    desc: Provision a new Hetzner VM with Claude Code
    cmds:
      - ./provision.sh

  resize:
    desc: Resize the VM to a different server type (preserves data)
    cmds:
      - ./resize.sh
    preconditions:
      - test -f {{.STATE_FILE}}

  destroy:
    desc: Destroy the provisioned VM (interactive confirmation)
    cmds:
      - ./destroy.sh

  # --- Connection ---

  init:
    desc: Populate .agentbox-state from an existing Hetzner VM (use on a new machine)
    cmds:
      - ./scripts/init-state.sh

  connect:
    desc: Interactive workspace + tmux session selector
    cmds:
      - ./scripts/connect.sh
    preconditions:
      - test -f {{.STATE_FILE}}

  ssh:root:
    desc: SSH into the VM as root (maintenance/debug)
    cmds:
      - ssh {{.SSH_OPTS}} root@{{.SERVER_IP}}
    vars:
      SERVER_IP:
        sh: grep '^SERVER_IP=' {{.STATE_FILE}} | cut -d= -f2-
    preconditions:
      - test -f {{.STATE_FILE}}

  # --- IDE tunnels ---

  tunnel:code:
    desc: "Start VS Code dev tunnel inside a workspace container. Usage: task tunnel:code WS=<name>"
    cmds:
      - |
        if [[ -z "{{.WS}}" ]]; then
          echo "Error: WS is required. Usage: task tunnel:code WS=<workspace-name>"
          exit 1
        fi
        echo "Starting VS Code tunnel in workspace ws-{{.WS}} ..."
        echo "Open VS Code → Remote Explorer → Tunnels to connect."
        echo ""
        ssh {{.SSH_OPTS}} -t agentbox@{{.SERVER_IP}} \
          "docker exec -it ws-{{.WS}} code tunnel --accept-server-license-terms"
    vars:
      SERVER_IP:
        sh: grep '^SERVER_IP=' {{.STATE_FILE}} | cut -d= -f2-
    preconditions:
      - test -f {{.STATE_FILE}}

  tunnel:jb:
    desc: "Print JetBrains Gateway SSH connection info for a workspace container. Usage: task tunnel:jb WS=<name>"
    cmds:
      - |
        if [[ -z "{{.WS}}" ]]; then
          echo "Error: WS is required. Usage: task tunnel:jb WS=<workspace-name>"
          exit 1
        fi
        SERVER_IP="{{.SERVER_IP}}"
        WS="{{.WS}}"
        PORT_BASE=$(ssh {{.SSH_OPTS}} agentbox@${SERVER_IP} \
          "docker inspect ws-${WS} 2>/dev/null | jq -r '.[0].Config.Labels[\"ads.port-base\"]'" 2>/dev/null || echo "")
        if [[ -z "${PORT_BASE}" ]] || [[ "${PORT_BASE}" == "null" ]]; then
          echo "Error: workspace 'ws-${WS}' not found. Run 'task connect' to create it."
          exit 1
        fi
        SSH_PORT=$((PORT_BASE + 22))
        echo ""
        echo "=== JetBrains Gateway — ws-${WS} ==="
        echo ""
        echo "  New Connection → SSH"
        echo "  Host: ${SERVER_IP}    Port: ${SSH_PORT}"
        echo "  User: agentbox        Auth: Key (your existing SSH key)"
        echo ""
        echo "Gateway auto-installs the IDE backend inside the container."
        echo ""
    vars:
      SERVER_IP:
        sh: grep '^SERVER_IP=' {{.STATE_FILE}} | cut -d= -f2-
    preconditions:
      - test -f {{.STATE_FILE}}

  # --- Config sync ---

  sync:
    desc: Sync local configs (.gitconfig, .ssh, .claude) to VM
    cmds:
      - ./sync-config.sh {{.SERVER_IP}}
    vars:
      SERVER_IP:
        sh: grep '^SERVER_IP=' {{.STATE_FILE}} | cut -d= -f2-
    preconditions:
      - test -f {{.STATE_FILE}}

  # --- Status & info ---

  status:
    desc: Show VM status and info
    cmds:
      - |
        echo "=== Agent Dev Space Status ==="
        echo ""
        cat {{.STATE_FILE}}
        echo ""
        echo "--- VM reachable ---"
        ssh {{.SSH_OPTS}} -o ConnectTimeout=5 agentbox@{{.SERVER_IP}} \
          "uptime; echo ''; echo '--- tmux sessions ---'; tmux list-sessions 2>/dev/null || echo 'No tmux sessions'; echo ''; echo '--- disk ---'; df -h / | tail -1; echo ''; echo '--- memory ---'; free -h | grep Mem; echo ''; echo '--- claude ---'; claude --version 2>/dev/null || echo 'not found'; echo ''; echo '--- docker ---'; docker --version 2>/dev/null || echo 'not installed'; docker compose version 2>/dev/null || echo ''" \
          2>/dev/null || echo "VM not reachable"
    vars:
      SERVER_IP:
        sh: grep '^SERVER_IP=' {{.STATE_FILE}} | cut -d= -f2-
    preconditions:
      - test -f {{.STATE_FILE}}

  ip:
    desc: Print the VM IP address
    cmds:
      - grep '^SERVER_IP=' {{.STATE_FILE}} | cut -d= -f2-
    preconditions:
      - test -f {{.STATE_FILE}}

  # --- Workspaces ---

  workspace:test:
    desc: Smoke-test the local workspace Docker image (agent-dev-space:latest)
    cmds:
      - ./scripts/test-workspace-image.sh {{.IMAGE}}
    vars:
      IMAGE: '{{default "agent-dev-space:latest" .IMAGE}}'

  workspace:list:
    desc: List all workspaces on the VM
    cmds:
      - ssh {{.SSH_OPTS}} agentbox@{{.SERVER_IP}} "docker ps -a --filter 'name=^ws-' --format 'table {{.Names}}\t{{.State}}\t{{.Size}}'"
    vars:
      SERVER_IP:
        sh: grep '^SERVER_IP=' {{.STATE_FILE}} | cut -d= -f2-
    preconditions:
      - test -f {{.STATE_FILE}}

  # --- Workspace image ---

  image:build:
    desc: Build the workspace Docker image locally
    cmds:
      - docker build --platform linux/amd64 -t agent-dev-space:latest docker/workspace

  image:test:
    desc: Build and smoke-test the workspace image
    cmds:
      - task: image:build
      - |
        echo "--- Smoke test ---"
        docker run --rm --platform linux/amd64 agent-dev-space:latest bash -c '
          set -e
          echo "node: $(node --version)"
          echo "npm: $(npm --version)"
          echo "claude: $(claude --version 2>/dev/null || echo ok)"
          echo "gh: $(gh --version | head -1)"
          echo "python3: $(python3 --version)"
          echo "git: $(git --version)"
          echo "tmux: $(tmux -V)"
          echo "code: $(code version 2>/dev/null | head -1 || echo ok)"
          echo "user: $(whoami) uid=$(id -u)"
          test "$(whoami)" = "agentbox"
          test "$(id -u)" = "1000"
          test -f ~/.tmux.conf
          grep -q "SSH agent forwarding" ~/.bashrc
          echo "--- All checks passed ---"
        '

  # --- Maintenance ---

  setup:
    desc: Re-run the setup script on an existing VM (idempotent)
    cmds:
      - scp {{.SSH_OPTS}} scripts/setup-vm.sh agentbox@{{.SERVER_IP}}:/tmp/setup-vm.sh
      - tar -C docker -cf - workspace | ssh {{.SSH_OPTS}} agentbox@{{.SERVER_IP}} "tar -C /tmp -xf - && rm -rf /tmp/docker-workspace && mv /tmp/workspace /tmp/docker-workspace"
      - ssh {{.SSH_OPTS}} agentbox@{{.SERVER_IP}} "sudo bash /tmp/setup-vm.sh && rm -f /tmp/setup-vm.sh"
      - ssh {{.SSH_OPTS}} agentbox@{{.SERVER_IP}} "docker build --label ads.workspace.git-hash=$(find docker/workspace -type f | sort | xargs sha256sum 2>/dev/null | sha256sum | awk '{print $1}') -t agent-dev-space:latest /tmp/docker-workspace"
    vars:
      SERVER_IP:
        sh: grep '^SERVER_IP=' {{.STATE_FILE}} | cut -d= -f2-
    preconditions:
      - test -f {{.STATE_FILE}}

